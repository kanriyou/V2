<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>micro:bit 自動えさやり機設定ツール (Bluetooth版)</title>
<style>
body {
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background-color: #f5f7fa;
color: #333;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
}
.container {
background-color: #ffffff;
padding: 30px;
border-radius: 12px;
box-shadow: 0 4px 15px rgba(0,0,0,0.1);
text-align: center;
width: 350px;
}
h2 {
margin-top: 0;
color: #4a5568;
}
.status {
font-size: 0.9em;
margin-bottom: 20px;
padding: 8px;
border-radius: 6px;
background-color: #edf2f7;
color: #4a5568;
}
.status.connected {
background-color: #c6f6d5;
color: #22543d;
}
.status.error {
background-color: #fed7d7;
color: #742a2a;
}
button, input[type="time"] {
width: 100%;
padding: 12px;
margin: 10px 0;
border-radius: 8px;
border: 1px solid #cbd5e0;
font-size: 16px;
box-sizing: border-box;
}
button {
cursor: pointer;
font-weight: bold;
transition: background-color 0.2s;
}
.btn-connect {
background-color: #4299e1;
color: white;
border: none;
}
.btn-connect:hover { background-color: #3182ce; }
.btn-send {
background-color: #48bb78;
color: white;
border: none;
}
.btn-send:hover { background-color: #38a169; }
button:disabled {
background-color: #e2e8f0;
color: #a0aec0;
cursor: not-allowed;
}
input[type="time"]:disabled, input[type="time"][readonly] {
background-color: #edf2f7;
color: #718096;
cursor: not-allowed;
}
.button-group {
display: flex;
gap: 10px;
margin-top: 20px;
}
.button-group button {
flex: 1;
margin: 0;
}
.display-panel {
margin: 10px 0;
font-size: 0.9em;
color: #4a5568;
}
.display-value {
font-weight: bold;
color: #2b6cb0;
font-size: 1.1em;
}
</style>
</head>
<body>

<div class="container">
<h2>micro:bit 自動えさやり機設定ツール</h2>
<div id="status" class="status">状態: 未接続</div>
<button id="connectBtn" class="btn-connect">micro:bit とBluetooth接続</button>

<div class="display-panel">
<span>micro:bitの現在時刻: </span>
<span id="currentTimeDisp" class="display-value">--:--</span>
</div>

<label for="timeInput1" style="display:block; text-align:left; font-size:0.9em; color:#4a5568; margin-bottom: 4px;">micro:bit側の設定タイマー:</label>
<input type="time" id="timeInput1" value="08:00" disabled>

<hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 20px 0;">

<label for="timeInput2" style="display:block; text-align:left; font-size:0.9em; color:#718096;">送信する時刻を選択:</label>
<input type="time" id="timeInput2" value="12:00" disabled>

<button id="sendBtn" class="btn-send" disabled>えさやり時刻を送信</button>

<div class="button-group">
<button id="esayari" class="btn-send" disabled>えさやり</button>
<button id="teishi" class="btn-send" disabled style="background-color: #ed8936;">強制停止</button>
</div>
</div>

<script>
// micro:bit BLE UART サービスのUUID群
const UART_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const TX_CHARACTERISTIC_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e'; // micro:bit受信 (PC送信)
const RX_CHARACTERISTIC_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e'; // micro:bit送信 (PC受信)

// バッファサイズ制限とタイムアウト
const MAX_BUFFER_SIZE = 1024;
const SYNC_TIMEOUT = 5000; // 5秒

let bluetoothDevice = null;
let txCharacteristic = null;
let rxCharacteristic = null;
let receiveBuffer = '';
let syncTimeoutId = null;

const connectBtn = document.getElementById('connectBtn');
const sendBtn = document.getElementById('sendBtn');
const esayari = document.getElementById('esayari');
const teishi = document.getElementById('teishi');
const timeInput1 = document.getElementById('timeInput1');
const timeInput2 = document.getElementById('timeInput2');
const statusDiv = document.getElementById('status');
const currentTimeDisp = document.getElementById('currentTimeDisp');

// ステータス更新ヘルパー関数
function updateStatus(message, type = 'neutral') {
  // type: 'neutral' | 'connected' | 'error'
  statusDiv.textContent = `状態: ${message}`;
  statusDiv.classList.remove('connected', 'error');
  if (type === 'connected') {
    statusDiv.classList.add('connected');
  } else if (type === 'error') {
    statusDiv.classList.add('error');
  }
}

// ブラウザの Web Bluetooth サポートチェック
if (!navigator.bluetooth) {
  updateStatus('このブラウザは Web Bluetooth に対応していません（Chrome/Edge 等 推奨）', 'error');
  connectBtn.disabled = true;
}

// 接続・切断の切り替え
connectBtn.addEventListener('click', async () => {
  if (!navigator.bluetooth) return; // 保険

  if (bluetoothDevice && bluetoothDevice.gatt && bluetoothDevice.gatt.connected) {
    disconnect();
    return;
  }

  try {
    updateStatus("デバイスを探しています...", 'neutral');

    // Bluetoothデバイスの要求（まずは名前プレフィックスで絞る）
    try {
      bluetoothDevice = await navigator.bluetooth.requestDevice({
        filters: [{ namePrefix: 'BBC micro:bit' }],
        optionalServices: [UART_SERVICE_UUID]
      });
    } catch (firstErr) {
      // ユーザーキャンセルならそのまま投げて上位でキャッチ
      if (firstErr.name === 'NotFoundError' || firstErr.name === 'DOMException') {
        // フィルタで見つからなかった/拒否された場合、全デバイスから選ぶフォールバックを提案
        const tryAll = confirm('指定のデバイス名が見つかりませんでした。全てのデバイスから選択しますか？(micro:bit を選択してください)');
        if (!tryAll) throw firstErr;
        bluetoothDevice = await navigator.bluetooth.requestDevice({
          acceptAllDevices: true,
          optionalServices: [UART_SERVICE_UUID]
        });
      } else {
        throw firstErr;
      }
    }

    updateStatus("接続中...", 'neutral');
    const server = await bluetoothDevice.gatt.connect();
    const service = await server.getPrimaryService(UART_SERVICE_UUID);

    // キャラクタリスティクの取得
    try {
      rxCharacteristic = await service.getCharacteristic(RX_CHARACTERISTIC_UUID);
      txCharacteristic = await service.getCharacteristic(TX_CHARACTERISTIC_UUID);
    } catch (error) {
      console.error("キャラクタリスティク取得エラー:", error);
      throw new Error("必要なBluetoothキャラクタリスティクが見つかりません");
    }

    // データ受信のデータ通知（Notification）を開始
    try {
      await rxCharacteristic.startNotifications();
      rxCharacteristic.addEventListener('characteristicvaluechanged', handleDataReceived);
    } catch (error) {
      console.error("Notification開始エラー:", error);
      throw new Error("通知機能の開始に失敗しました");
    }

    // 切断イベントの監視
    bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnected);

    // UI状態の更新
    connectBtn.textContent = "接続解除";
    sendBtn.disabled = false;
    esayari.disabled = false;
    teishi.disabled = false;
    timeInput2.disabled = false;

    // 接続直後に初期データを要求（タイムアウト付き）
    updateStatus("初期データを取得中...", 'neutral');

    const syncPromise = sendData('SYNC\n');
    const timeoutPromise = new Promise((_, reject) => {
      syncTimeoutId = setTimeout(() => reject(new Error('初期データ取得がタイムアウトしました')), SYNC_TIMEOUT);
    });

    try {
      await Promise.race([syncPromise, timeoutPromise]);
      if (syncTimeoutId) { clearTimeout(syncTimeoutId); syncTimeoutId = null; }
      updateStatus("Bluetooth接続済み", 'connected');
    } catch (timeoutError) {
      console.warn(timeoutError.message);
      if (syncTimeoutId) { clearTimeout(syncTimeoutId); syncTimeoutId = null; }
      // タイムアウトしても接続は続行（初期データの取得に失敗した旨を表示）
      updateStatus("Bluetooth接続済み（初期データ取得失敗）", 'connected');
    }

  } catch (error) {
    console.error("Bluetooth接続エラー:", error);
    updateStatus(`接続失敗: ${error.message}`, 'error');
    resetUI();
  }
});

// データの送信関数
async function sendData(stringData) {
  if (!txCharacteristic) {
    console.error("txCharacteristicが初期化されていません");
    throw new Error("Bluetoothが接続されていません");
  }
  try {
    const encoder = new TextEncoder();
    const data = encoder.encode(stringData);
    await txCharacteristic.writeValue(data);
    console.log(`送信成功: ${stringData.trim()}`);
  } catch (error) {
    console.error("送信エラー:", error);
    updateStatus(`送信失敗: ${error.message}`, 'error');
    throw error;
  }
}

// 各ボタンのイベント処理
sendBtn.addEventListener('click', async () => {
  const timeVal = timeInput2.value;
  if (!timeVal) {
    updateStatus("時刻を入力してください", 'error');
    return;
  }

  const fourDigitTime = timeVal.replace(':', '');
  try {
    await sendData(fourDigitTime + '\n');
    updateStatus(`時刻送信済み: ${fourDigitTime}`, 'connected');
    setTimeout(() => {
      if (bluetoothDevice && bluetoothDevice.gatt && bluetoothDevice.gatt.connected) {
        updateStatus("Bluetooth接続済み", 'connected');
      }
    }, 2000);
  } catch (error) {
    console.error("送信エラー:", error);
  }
});

esayari.addEventListener('click', async () => {
  try {
    await sendData('FEED\n');
    updateStatus("えさやりコマンド送信済み", 'connected');
    setTimeout(() => {
      if (bluetoothDevice && bluetoothDevice.gatt && bluetoothDevice.gatt.connected) {
        updateStatus("Bluetooth接続済み", 'connected');
      }
    }, 2000);
  } catch (error) {
    console.error("送信エラー:", error);
  }
});

teishi.addEventListener('click', async () => {
  try {
    await sendData('STOP\n');
    updateStatus("強制停止コマンド送信済み", 'connected');
    setTimeout(() => {
      if (bluetoothDevice && bluetoothDevice.gatt && bluetoothDevice.gatt.connected) {
        updateStatus("Bluetooth接続済み", 'connected');
      }
    }, 2000);
  } catch (error) {
    console.error("送信エラー:", error);
  }
});

// データ受信時の処理
function handleDataReceived(event) {
  const value = event.target.value;
  const decoder = new TextDecoder();
  const text = decoder.decode(value);

  receiveBuffer += text;

  // バッファサイズ超過チェック
  if (receiveBuffer.length > MAX_BUFFER_SIZE) {
    console.warn("バッファサイズが超過しました。バッファをクリアします。");
    receiveBuffer = '';
    updateStatus("データ受信エラー（バッファ超過）", 'error');
    return;
  }

  // 改行コード（\n または \r）が含まれているか確認
  if (receiveBuffer.includes('\n') || receiveBuffer.includes('\r')) {
    const lines = receiveBuffer.split(/\r?\n/);
    // 最後の要素はまだ途中のデータである可能性があるためバッファに戻す
    receiveBuffer = lines.pop() || '';

    // 完了した行を処理
    for (const line of lines) {
      const trimmedLine = line.trim();
      if (trimmedLine !== "") {
        processReceivedData(trimmedLine);
      }
    }
  }
}

// 受信した数値を判定してUIに反映する関数
function processReceivedData(data) {
  if (!data || typeof data !== 'string') {
    console.warn("無効なデータ形式:", data);
    return;
  }

  const num = parseInt(data, 10);
  if (isNaN(num)) {
    console.warn("数値への変換に失敗:", data);
    return; // 数値以外（ノイズなど）は無視
  }

  if (num >= 10000) {
    // 10000以上の場合はmicro:bitの「現在時刻」（例: 11130 -> 11:30）
    const timeNum = num - 10000;
    currentTimeDisp.textContent = formatToTimeString(timeNum);
    updateStatus("Bluetooth接続済み", 'connected');
  } else {
    // 10000未満の場合はmicro:bitに保存されている「タイマー設定時間」
    timeInput1.value = formatToTimeString(num);
  }
}

// 数値を "HH:MM" 形式の文字列に変換するヘルパー
function formatToTimeString(num) {
  const str = num.toString().padStart(4, '0');
  const hours = str.slice(0, 2);
  const minutes = str.slice(2, 4);
  return `${hours}:${minutes}`;
}

// 手動切断処理
function disconnect() {
  if (bluetoothDevice && bluetoothDevice.gatt && bluetoothDevice.gatt.connected) {
    bluetoothDevice.gatt.disconnect();
  }
}

// 切断されたときの共通処理
function onDisconnected() {
  console.log("Bluetooth接続が切断されました。");
  resetUI();
}

// UIと変数の初期化
function resetUI() {
  // タイムアウトのクリア
  if (syncTimeoutId) {
    clearTimeout(syncTimeoutId);
    syncTimeoutId = null;
  }

  // リスナーの重複登録を防ぐため、切断時にクリア
  try {
    if (bluetoothDevice) {
      bluetoothDevice.removeEventListener('gattserverdisconnected', onDisconnected);
    }
  } catch (e) { /* ignore */ }

  try {
    if (rxCharacteristic) {
      rxCharacteristic.removeEventListener('characteristicvaluechanged', handleDataReceived);
    }
  } catch (e) { /* ignore */ }

  bluetoothDevice = null;
  txCharacteristic = null;
  rxCharacteristic = null;
  receiveBuffer = '';

  updateStatus('未接続', 'neutral');
  currentTimeDisp.textContent = "--:--";
  connectBtn.textContent = "micro:bit とBluetooth接続";
  sendBtn.disabled = true;
  esayari.disabled = true;
  teishi.disabled = true;
  timeInput2.disabled = true;
}
</script>
</body>
</html>
